apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pixel-war.fullname" . }}-db-secret
  labels:
    {{- include "pixel-war.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.database.user }}
  POSTGRES_PASSWORD: {{ .Values.database.password }}
  POSTGRES_DB: {{ .Values.database.name }}
