apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pixel-war.fullname" . }}-backend
  labels:
    {{- include "pixel-war.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ include "pixel-war.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "pixel-war.fullname" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "pixel-war.fullname" . }}-backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pixel-war.fullname" . }}-db-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pixel-war.fullname" . }}-db-secret
                  key: POSTGRES_PASSWORD
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
