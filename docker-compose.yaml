services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pixelwar
      POSTGRES_PASSWORD: pixelwar
      POSTGRES_DB: pixelwar
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelwar"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: pixelwar
      DB_PASSWORD: pixelwar
      DB_NAME: pixelwar
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./projet-cdc
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
